name: release

# Cut a release by pushing a tag like `v0.1.0`. One Linux job and ONE macOS
# job (Apple Silicon, which cross-compiles the Intel target — the macOS SDK is
# universal). Jobs are independent (fail-fast: false) and each attaches its own
# assets, so a slow or dead macOS queue can never block the Linux assets and
# only one macOS runner is ever needed.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: apple (aarch64 + x86_64)
            targets: "aarch64-apple-darwin x86_64-apple-darwin"
          - os: ubuntu-latest
            name: linux x86_64
            targets: "x86_64-unknown-linux-gnu"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev libdbus-1-dev
      - name: Build and package each target
        run: |
          for t in ${{ matrix.targets }}; do
            rustup target add "$t"
            cargo build --release -p tojfl-cli --target "$t"
            tar -C "target/$t/release" -czf "tojfl-${{ github.ref_name }}-$t.tar.gz" tojfl
            shasum -a 256 "tojfl-${{ github.ref_name }}-$t.tar.gz" > "tojfl-${{ github.ref_name }}-$t.tar.gz.sha256"
          done
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tojfl-${{ github.ref_name }}-*.tar.gz
            tojfl-${{ github.ref_name }}-*.tar.gz.sha256
